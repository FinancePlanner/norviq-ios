<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none" role="img" aria-label="Norviq Cerberus mark">
  <!-- Vigil ring -->
  <circle cx="120" cy="120" r="108" stroke="#8F5E1C" stroke-width="3"/>
  <circle cx="120" cy="120" r="98" stroke="#8F5E1C" stroke-width="1" opacity="0.35"/>
  <!-- Gate bar + portcullis -->
  <path d="M50 168 H190" stroke="#8F5E1C" stroke-width="3" stroke-linecap="round"/>
  <path d="M68 168 V186 M94 168 V190 M120 168 V194 M146 168 V190 M172 168 V186" stroke="#8F5E1C" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Three heads: sentinel arches, center tallest -->
  <path d="M71 156 V106 L84 84 L97 106 V156" stroke="#8F5E1C" stroke-width="3" stroke-linejoin="round"/>
  <path d="M105 156 V90 L120 60 L135 90 V156" stroke="#8F5E1C" stroke-width="3" stroke-linejoin="round"/>
  <path d="M143 156 V106 L156 84 L169 106 V156" stroke="#8F5E1C" stroke-width="3" stroke-linejoin="round"/>
  <!-- Ear ticks on center head -->
  <path d="M112 76 L107 66 M128 76 L133 66" stroke="#8F5E1C" stroke-width="2" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="84" cy="118" r="3" fill="#8F5E1C"/>
  <circle cx="120" cy="104" r="3.5" fill="#8F5E1C"/>
  <circle cx="156" cy="118" r="3" fill="#8F5E1C"/>
</svg>
