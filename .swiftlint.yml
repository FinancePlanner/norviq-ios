disabled_rules:
  - line_length
  - file_length
  - type_body_length
  - function_body_length
  - multiple_closures_with_trailing_closure
  - cyclomatic_complexity

identifier_name:
  min_length:
    error: 3
    warning: 2
  excluded:
    - to
    - ok
    - vm
    - x
    - y
    - i
    - v
    - id
    - up
    - at
    - q1
    - q2
    - q3
    - q4
    - fy
    - df
    - vm
    - k
    - ns
    - s
    - x
    - y
    - i

type_name:
  min_length: 3
  excluded:
    - ...

function_parameter_count:
  warning: 10
  error: 15

force_try:
  severity: warning

excluded:
  - .SourcePackages
  - build
  - .git
  - .cache
