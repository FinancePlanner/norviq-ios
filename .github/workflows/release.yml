# iOS release pipeline.
#   push to main        -> TestFlight build (beta lane)
#   manual dispatch     -> App Store release (release/hotfix lane), gated by the
#                          GitHub environment "app-store" (required reviewer).
#
# Required repo secrets:
#   ASC_KEY_ID, ASC_ISSUER_ID, ASC_KEY_P8 (base64 .p8)  — App Store Connect API key
#   MATCH_PASSWORD                                       — match repo encryption
#   MATCH_GIT_BASIC_AUTHORIZATION                        — base64 "x-access-token:<PAT>",
#                                                          PAT with Contents:Read on norviq-certificates
#                                                          (deploy keys disabled org-wide)
#   SENTRY_ORG, SENTRY_PROJECT, SENTRY_AUTH_TOKEN        — dSYM upload (optional)
#   SECRETS_XCCONFIG                                     — full content of Config/Secrets.xcconfig
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      lane:
        description: Release lane
        required: true
        type: choice
        options: [release, hotfix]
        default: release
      version:
        description: Marketing version (e.g. 1.1) — empty keeps current
        required: false
        type: string

concurrency:
  group: ios-release
  cancel-in-progress: false

jobs:
  beta:
    if: github.event_name == 'push'
    name: TestFlight (beta)
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Materialize Secrets.xcconfig
        run: printf '%s' "$SECRETS_XCCONFIG" > Config/Secrets.xcconfig
        env:
          SECRETS_XCCONFIG: ${{ secrets.SECRETS_XCCONFIG }}

      - name: Fastlane beta
        run: bundle exec fastlane beta
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  release:
    if: github.event_name == 'workflow_dispatch'
    name: App Store (${{ inputs.lane }})
    runs-on: macos-15
    timeout-minutes: 90
    environment: app-store # required reviewer = the manual gate
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Materialize Secrets.xcconfig
        run: printf '%s' "$SECRETS_XCCONFIG" > Config/Secrets.xcconfig
        env:
          SECRETS_XCCONFIG: ${{ secrets.SECRETS_XCCONFIG }}

      - name: Fastlane ${{ inputs.lane }}
        run: bundle exec fastlane ${{ inputs.lane }} ${{ inputs.version != '' && format('version:{0}', inputs.version) || '' }}
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
